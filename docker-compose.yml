services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: coffee_shops
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee_shops"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: build
    command: ./bin/rails server -b 0.0.0.0
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://coffee_shops:password@db/coffee_shops_development
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
